name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 1. Creamos la estructura inicial de Android
      - name: Add Android Platform
        run: npx cap add android

      # [OPCIÓN 2] Modificar estilos para forzar Pantalla Completa nativa
      - name: Force Native Fullscreen Mode
        run: |
          sed -i 's/<item name="windowNoTitle">true<\/item>/<item name="windowNoTitle">true<\/item>\n        <item name="android:windowFullscreen">true<\/item>/' android/app/src/main/res/values/styles.xml

      # 2. Generar automáticamente los íconos desde tu carpeta assets/
      - name: Generate App Icons and Splash Screens
        run: |
          npm install -D @capacitor/assets
          npx @capacitor/assets generate --android --iconBackgroundColor '#ffffff' --splashBackgroundColor '#ffffff'

      # 3. Sincronizamos los plugins de compartir y archivos con el proyecto Android
      - name: Sync Capacitor Project
        run: npx cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
