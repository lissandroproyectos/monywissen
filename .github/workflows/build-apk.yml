name: Build Android APK

on:
  push:
    branches: [ main ] # Cambia esto a "master" si tu rama principal se llama master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Quitamos la línea de caché para que no pida el archivo .lock

      - name: Install Dependencies
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 1. Creamos la estructura inicial de Android
      - name: Add Android Platform
        run: npx cap add android

      # 2. Generar automáticamente los íconos y la pantalla de carga (Splash) desde tu SVG
      - name: Generate App Icons and Splash Screens
        run: |
          npm install -D @capacitor/assets
          npx @capacitor/assets generate --android --iconBackgroundColor '#ffffff' --splashBackgroundColor '#ffffff'

      # 3. Sincronizamos los nuevos íconos generados con el proyecto final
      - name: Sync Capacitor Project
        run: npx cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
